<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="inGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect x="0" y="4" width="56" height="56" rx="13" fill="url(#iconBg)"/>
  <!-- Document lines inside icon -->
  <rect x="14" y="23" width="28" height="4.5" rx="2.25" fill="white" opacity="0.9"/>
  <rect x="14" y="31" width="22" height="4.5" rx="2.25" fill="white" opacity="0.75"/>
  <rect x="14" y="39" width="16" height="4.5" rx="2.25" fill="white" opacity="0.6"/>
  <!-- Arrow in icon -->
  <path d="M27 45 L27 20 L38 10" stroke="url(#arrowGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polygon points="38,10 48,10 38,20" fill="url(#arrowGrad)"/>

  <!-- Wordmark: "Job" dark + "IN" gradient -->
  <text x="72" y="44" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="800" fill="#0f172a" letter-spacing="-1">Job</text>
  <text x="140" y="44" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#inGrad)" letter-spacing="-1">IN</text>
</svg>
